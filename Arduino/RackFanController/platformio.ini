; ============================================================
; Rack Fan Controller - Multi‑Environment Build
; ============================================================

; ------------------------------------------------------------
; LCD Build (default)
; ------------------------------------------------------------
[env:uno_lcd]
platform = atmelavr
board = uno
framework = arduino

build_flags =
    -DUSE_OLED_DISPLAY=0

lib_deps =
    adafruit/DHT sensor library@1.4.7
    adafruit/Adafruit Unified Sensor@1.1.15
    marcoschwartz/LiquidCrystal_I2C@1.1.4

lib_ignore =
    Adafruit SSD1306
    Adafruit GFX Library

build_src_filter =
    +<*>
    -<OBSOLETE_*>


; ------------------------------------------------------------
; OLED Build
; ------------------------------------------------------------
[env:uno_oled]
platform = atmelavr
board = uno
framework = arduino

build_flags =
    -DUSE_OLED_DISPLAY=1

lib_deps =
    adafruit/DHT sensor library@1.4.7
    adafruit/Adafruit Unified Sensor@1.1.15
    adafruit/Adafruit SSD1306@2.5.7
    adafruit/Adafruit GFX Library@1.11.9

build_src_filter =
    +<*>
    -<OBSOLETE_*>
